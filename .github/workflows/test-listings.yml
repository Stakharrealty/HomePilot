name: Test homepilot-listings (DDF)

# Separate from deploy.yml on purpose:
# - Tests a different Worker (homepilot-listings), not the main app
# - Only triggers when files under workers/homepilot-listings/ or the
#   two listings test files change -- never runs on unrelated app changes
# - listings_metadata_field_test.js calls CREA's live API via the deployed
#   Worker's /metadata endpoint, so this should NOT run on every push to
#   main the way the main app's tests do
# - Does NOT deploy anything. This is test-only until homepilot-listings
#   has its own real deploy pipeline (not yet built).

on:
  push:
    paths:
      - "workers/homepilot-listings/**"
      - "tests/listings_query_node_limit_test.js"
      - "tests/listings_metadata_field_test.js"

jobs:
  test-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Query node-count limit test (no network required)
        run: node tests/listings_query_node_limit_test.js

      - name: Metadata field verification test (calls live CREA API via deployed Worker)
        run: node tests/listings_metadata_field_test.js

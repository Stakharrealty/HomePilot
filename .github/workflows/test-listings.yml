name: Test homepilot-listings (DDF)

# Trigger matches deploy.yml exactly (main only) -- explicit decision by
# Sandeep on 2026-07-21, for consistency across both pipelines. Note this
# means listings tests do NOT run on dev pushes -- only once merged to main.
# Still separate from deploy.yml itself because:
# - Tests a different Worker (homepilot-listings), not the main app
# - Does NOT deploy anything. This is test-only until homepilot-listings
#   has its own real deploy pipeline (not yet built).
# - listings_metadata_field_test.js calls CREA's live API via the deployed
#   Worker's /metadata endpoint on every run

on:
  push:
    branches: [main]
    paths:
      - "workers/homepilot-listings/**"
      - "tests/listings_module_load_test.js"
      - "tests/listings_query_node_limit_test.js"
      - "tests/listings_price_floor_test.js"
      - "tests/listings_stale_removal_test.js"
      - "tests/listings_city_fairness_test.js"
      - "tests/listings_display_backend_test.js"
      - "tests/listings_metadata_field_test.js"
      - "tests/listings_office_lookup_failure_test.js"

jobs:
  test-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Module load verification (no network required)
        run: node tests/listings_module_load_test.js

      - name: Query node-count limit test (no network required)
        run: node tests/listings_query_node_limit_test.js

      - name: Price floor test (no network required)
        run: node tests/listings_price_floor_test.js

      - name: Stale listing removal test (no network required, uses in-memory fake D1)
        run: node tests/listings_stale_removal_test.js

      - name: Per-city fair coverage test (no network required)
        run: node tests/listings_city_fairness_test.js

      - name: Listing display backend test (office lookup, analytics URL, photos -- no network required)
        run: node tests/listings_display_backend_test.js

      - name: Metadata field verification test (calls live CREA API via deployed Worker)
        run: node tests/listings_metadata_field_test.js

      - name: Office lookup failure visibility test (no network required, mocked fetch)
        run: node tests/listings_office_lookup_failure_test.js
